version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: market-price-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: market_price_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - market-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: market-price-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/market_price_db?authSource=admin
      JWT_SECRET: your_jwt_secret_key_here_change_in_production
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - market-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: market-price-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - market-network

  ml-model:
    build:
      context: ./ml-model
      dockerfile: Dockerfile
    container_name: market-price-ml
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: development
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/market_price_db?authSource=admin
    depends_on:
      - mongodb
    volumes:
      - ./ml-model:/app
    networks:
      - market-network

volumes:
  mongodb_data:
    driver: local

networks:
  market-network:
    driver: bridge
